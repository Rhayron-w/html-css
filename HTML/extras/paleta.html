<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padrões de Estilo</title>
    <link rel="stylesheet" href="paleta.css">
</head>
<body>
    <h1 class="gr">GRADIENTS</h1>
    <div class="gradient">
        <abbr title="Noir Velvet">
            <div class="gr1"></div>
        </abbr>
        <abbr title="Deep Space">
            <div class="gr2"></div>
        </abbr>
        <abbr title="Crimson Night">
            <div class="gr3"></div>
        </abbr>
        <abbr title="Obsidian Glow">
            <div class="gr4"></div>
        </abbr>
        <abbr title="Phantom Purple">
            <div class="gr5"></div>
        </abbr>
        <abbr title="Midnight Fuel">
            <div class="gr6"></div>
        </abbr>
    </div>
    <div class="cores">
        <div class="cores1">
            <h1 class="tw">WHITE TYPES</h1>
            <div class="white">
                <abbr title="White Smoke">
                    <div class="w1"></div>
                </abbr>
                <abbr title="Old Lace">
                    <div class="w2"></div>
                </abbr>
                <abbr title="Decorator's White">
                    <div class="w3"></div>
                </abbr>
                <abbr title="Whitewash">
                    <div class="w4"></div>
                </abbr>
                <abbr title="Feather White">
                    <div class="w5"></div>
                </abbr>
            </div>
            <h1 class="tb">BLACK TYPES</h1>
            <div class="black">
                <abbr title="Tech Black">
                    <div class="b1"></div>
                </abbr>
                <abbr title="Dark Raisin">
                    <div class="b2"></div>
                </abbr>
                <abbr title="Ink Black">
                    <div class="b3"></div>
                </abbr>
                <abbr title="Dark Charcoal">
                    <div class="b4"></div>
                </abbr>
                <abbr title="Premium Black">
                    <div class="b5"></div>
                </abbr>
            </div>
            <h1 class="tr">RED TYPES</h1>
            <div class="red">
                <abbr title="Ferrari">
                    <div class="r1"></div>
                </abbr>
                <abbr title="Vermilion">
                    <div class="r2"></div>
                </abbr>
                <abbr title="Prismatic Legacy">
                    <div class="r3"></div>
                </abbr>
                <abbr title="Coke Red">
                    <div class="r4"></div>
                </abbr>
                <abbr title="Liverpool Red">
                    <div class="r5"></div>
                </abbr>
            </div>
        </div>
        <div class="cores2">
            <h1 class="tbl">BLUE TYPES</h1>
            <div class="blue">
                <abbr title="Midnight Blue">
                    <div class="bl1"></div>
                </abbr>
                <abbr title="Medium blue">
                    <div class="bl2"></div>
                </abbr>
                <abbr title="Duke Blue">
                    <div class="bl3"></div>
                </abbr>
                <abbr title="Medium Sapphire">
                    <div class="bl4"></div>
                </abbr>
                <abbr title="Magic Blue">
                    <div class="bl5"></div>
                </abbr>
            </div>
            <h1 class="tg">GREEN TYPES</h1>
            <div class="green">
                <abbr title="Shrek Green">
                    <div class="g1"></div>
                </abbr>
                <abbr title="Dollar Bill">
                    <div class="g2"></div>
                </abbr>
                <abbr title="Road Sign Green">
                    <div class="g3"></div>
                </abbr>
                <abbr title="Paris Green">
                    <div class="g4"></div>
                </abbr>
                <abbr title="Irish Green">
                    <div class="g5"></div>
                </abbr>
            </div>
            <h1 class="ty">YELLOW TYPES</h1>
            <div class="yellow">
                <abbr title="Bumblebee">
                    <div class="y1"></div>
                </abbr>
                <abbr title="Minion Yellow">
                    <div class="y2"></div>
                </abbr>
                <abbr title="Royal Yellow">
                    <div class="y3"></div>
                </abbr>
                <abbr title="Cream">
                    <div class="y4"></div>
                </abbr>
                <abbr title="Sunflower">
                    <div class="y5"></div>
                </abbr>
            </div>
        </div>
    </div>
</body>
</html>
