<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de tela de login</title>
    <link rel="stylesheet" href="log.css">
    <script src="https://unpkg.com/akar-icons-fonts"></script>
</head>
<body>
    <main class="container">
        <form>
            <h1>Login</h1>
            <main class="caixa-texto">
                <input type="text" placeholder="Usuario" required>
                <i class="ai-person"></i>
            </main>
            <main class="caixa-texto">
                <input type="password" id="senha" placeholder="Senha" required autocomplete="Nova-senha">
                <i class="ai-lock-on" id="alterar-senha"></i>
            </main>
            <aside class="lembrar">
                <label>Lembrar de Mim
                    <input type="checkbox">
                </label>
                <a href="#">Esqueceu a senha?</a>
            </aside>
            <button type="submit" class="btn">Login</button>
            <aside class="botao">
                <a href="#"><i class="ai-google-fill"></i>Google</a>--
                <a href="#"><i class="ai-facebook-fill"></i>Facebook</a>
            </aside>
        </form>
    </main>
</body>
</html>
