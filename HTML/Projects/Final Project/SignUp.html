<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta</title>
    <link rel="stylesheet" href="css/head.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
    <main class="container">
    <header>
        <h1 class="titulo">FarmáciaDigi+</h1>
        <img src="img/Logo.png" alt="Logo Digi+" width="25px"
        height="25px">
        <div class="botao">
            <a href="meu-pedido.html"><img src="img/Carrinho.png" alt="Compras" width="25px"></a>
            <a href="SignUp.html"><img src="img/User.png" alt="Conta" width="25px"></a>
        </div>
    </header>
    <main class="formulario">
        <h1>Crie sua Conta na Digi+</h1>
        <form action="http://localhost:8080/cadastro" method="post">
            <input type="text" name="nome" id="nome" placeholder="Nome" required>
            <input type="text" name="sobrenome" id="sobrenome" placeholder="Sobrenome" required>
            <h1>Data de Nascimento</h1>
            <input type="date" name="data-nasc" id="data-nasc" required>
            <input type="email" name="email" id="email" placeholder="E-mail" required>
            <input type="password" name="senha" id="senha" placeholder="Crie sua Senha" required>
            <input type="password" name="confirm-senha" id="confirm-senha" placeholder="Confirme sua Senha" required>
            <input type="tel" name="telefone" id="telefone" placeholder="Número" required>
            <button type="submit">Criar Conta</button> 
        </form>
    </main>
    <footer>
        <section class="links">
        <aside>
            <a href="#">Institucional</a>
            <a href="about.html">Quem Somos</a>
            <a href="#">Ações Sociais</a>
            <a href="#">Políticas de Privacidade</a>
            <a href="#">Parceiros de Entrega</a>
        </aside>
        <aside>
            <a href="#">Central de Ajuda</a>
            <a href="meu-pedido.html">Meus Pedidos</a>
            <a href="#">Minha Conta</a>
            <a href="#">Dados Pessoais</a>
        </aside>
        </section>
        <section class="QrCode">
            <p>Nosso App</p>
            <img src="img/ic_baseline-qrcode.png" alt="Code" width="100px">
        </section>
        <section class="Redes">
            <a href="#"><img src="img/Instagram.png" alt="Instagram" width="49.95px" height="49.95px">Instagram</a>
            <a href=""><img src="img/Whatsapp.png" alt="Whatsapp" width="49.95px" height="49.95px">Whatsapp</a>
            <a href=""><img src="img/LinkedIn.png" alt="LinkedIn" width="49.95px" height="49.95px">LinkedIn</a>  
        </section>
    </footer>
    </main>
</body>
</html>
