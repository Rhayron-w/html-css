<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-classes e pseudo-elementos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Personalizando links</h1>
    <h2><mark>exemplo 1</mark></h2>

    <p>
        acesse esse link 
        <a href="https://www.youtube.com" target="_blank">aqui</a>
    </p>

    <h2><mark>Exemplo 2</mark></h2>

    <p>
        Para saber mais acesse o link 
        <a href="https://vlr.gg" target="_blank">por aqui</a>
    </p>

    <h2><mark>Exemplo 3</mark></h2>

    <p>
        Para conhecer melhor acesse nosso site clicando nesse 
        <a href="https://google.com" target="_blank" class="especial">link aqui</a>
    </p>
    <br>
    <div>
        passe o mouse aqui.
        <p>
            SURPRESSAAA!!
        </p>
    </div>
    <p>
        veja o conteúdo oculto.
    </p>
</body>
</html>
