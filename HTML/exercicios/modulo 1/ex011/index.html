<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprendendo com links</title>
</head>
<body>
    <h1>Usando links externos</h1>
    <hr>
    <h2>Links do google</h2>
    <p>Você pode ver vídeos de todos os tipos e até aulas no <a href="https://youtube.com" target="_blank" rel="external">Youtube</a> <!--o parâmetro target="_blank" e o parâmetro rel="external" servem para abrir o link externo que está no seu site, mas ele não irá fechar a guia do seu site, apenas abrirá uma nova após clicar no link.--> </p>
    <p>Você pode acompanhar os campeonatos de valorant no<a href="https://vlr.gg" hreflang="en">VLR</a><!--o parâmetro hreflang="en" serve para indicar qual é o idioma principal do link que você colocou, isso ajuda o navegador a entender se é necessário traduzir aquele site ou não.-->
    </p>
    
</body>
</html>
