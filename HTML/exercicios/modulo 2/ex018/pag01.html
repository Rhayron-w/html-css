<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de hover</title>
    <style>
        div:hover {
            color: red;
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: white;
            background-color: black;
            width: 120px;
        }
    </style>
</head>
<body>
    <p>
        PASSE O MOUSE NO TEXTO ABAIXO.
    </p>
        <div>
            PASSE O MOUSE AQUI
            <p>
                TEXTO OCULTO
            </p>
        </div>
</body>
</html>
