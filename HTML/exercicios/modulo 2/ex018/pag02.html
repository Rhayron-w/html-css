<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: darkred;
            text-decoration: underline;
        }
        
        a:active {
            color: black;
        }

        .especial {
            background-color: rgb(255, 154, 154);
        }
        .especial::after {
            content: '[link]';
            text-decoration: none;
            color: black;
            font-weight: normal;
        }
        .especial::before {
            content: '⮕';
            color: black;

        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul type="circle">
        <li><a href="https://youtube.com" target="_blank" rel="external">Youtube</a></li>
        <li><a href="https://instagram.com" target="_blank" rel="external" class="especial">Instagram</a></li>
        <li><a href="https://twitter.com" target="_blank" rel="external">Twitter</a></li>
    </ul>
    
</body>
</html>
