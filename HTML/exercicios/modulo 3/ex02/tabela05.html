<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Filmes</title>
    <style>
        body {
            background-color: rgb(236, 236, 236);
            font-family: Arial, Helvetica, sans-serif;
        }
        
        table {
            border-collapse: collapse;
            width: 700px;
        }

        td {
            border: 1px solid black;
            background-color: white;
            padding: 10px 10px 10px 5px;
        }

        th {
            border: 1px solid black;
            background-color: rgb(175, 175, 175);
        }
    </style>
</head>
<body>
    <table>

        <caption>
            <strong>Filmes Favoritos</strong>
        </caption>
        <thead>
            <tr>
                <th><strong>Grupos</strong></th>
                <th scope="col"><strong>Nomes</strong></th>
                <th colspan="3" scope="colgroup"><strong>Filmes</strong></th>
            </tr>
        </thead>

        <tbody>
                <tr>
                    <th rowspan="3" scope="rowgroup"><strong>Mulheres</strong></th>
                    <td>Ana Maria Santos</td>
                    <td>Alien</td>
                    <td>Rambo</td>
                    <td>Vingadores</td>
                </tr>
                <tr>
                    <td>Beatriz Souza</td>
                    <td>Hulk</td>
                    <td>Inception</td>
                    <td>Batman</td>
                </tr>
                <tr>
                    <td>Cláudia Melo</td>
                    <td>Oblivion</td>
                    <td>Matrix</td>
                    <td>Big Hero</td>
                </tr>
                <tr>
                    <th rowspan="3" scope="rowgroup"><strong>Homens</strong></th>
                    <td>Bruno Mendonça</td>
                    <td>Intocáveis</td>
                    <td>Amnésia</td>
                    <td>Gladiador</td>
                </tr>
                <tr>
                    <td>Daniel Lourenço</td>
                    <td>Wall-E</td>
                    <td>Oldboy</td>
                    <td>Dangal</td>
                </tr>
                <tr>
                    <td>Fabiano Mota</td>
                    <td>Star Wars 5</td>
                    <td>Taxi Driver</td>
                    <td>Toy Story</td>
                </tr>
        </tbody>
    </table>
    
</body>
</html>
